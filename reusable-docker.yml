name: Reusable_docker_file
on:
 workflow_call:
   
   inputs:
    image_name: 
     required: true
     type: string
    tags:
     required: true 
     type: string
   
   secrets:
    docker_token:
     required: true
    docker_username:
     required: true
   
   outputs:
    image_url:
      description: "Pushed Docker Image URL"
      value: ${{ inputs.image_name }}:${{ inputs.tag }}

jobs:
  docker-build-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.docker_username }}
          password: ${{ secrets.docker_token }}

      - name: Build and Push
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ inputs.image_name }}:${{ inputs.tag }}, ${{ inputs.image_name }}:latest
