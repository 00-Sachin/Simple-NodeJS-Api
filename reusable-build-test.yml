name: Reuseable_build_test
on:
  workflow_call:
    inputs:
      node_version:
        required: false
        type: string
        default: '20'
      run_tests:
        required: false
        type: boolean
        default: true
    outputs:
      test_result:
        description: "Status of the build and test"
        value: ${{ jobs.build-test.outputs.status }}

jobs:
  build-test:
    runs-on: ubuntu:latest
    outputs:
      status: ${{ jobs.status }}
    steps:
     - name: chechkout the code 
       uses: actions/checkout@v4

     - name: Setup Node.js
       uses: action/setup-node@v4
       with:
        node-version: ${{ inputs.node_version }}
        cache: 'npm'

     - name: Install dependencies
       run: npm ci

     - name: Setup Test 
       if: ${{ inputs.run_tests == true }}
       run: npm test 